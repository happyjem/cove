name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild -scheme Cove -configuration Release -derivedDataPath .build build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Cove" \
            --window-size 600 400 \
            --icon "Cove.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "Cove.app" \
            --skip-jenkins \
            "Cove.dmg" \
            ".build/Build/Products/Release/Cove.app"

      - name: Create ZIP
        run: ditto -c -k --keepParent ".build/Build/Products/Release/Cove.app" Cove.app.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Cove.dmg
            Cove.app.zip
          generate_release_notes: true
