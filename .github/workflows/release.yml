name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - run: brew install duckdb

      - name: Build
        run: |
          xcodebuild -scheme Cove -configuration Release -derivedDataPath .build build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Cove" \
            --window-size 600 400 \
            --icon "Cove.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "Cove.app" \
            --skip-jenkins \
            "Cove.dmg" \
            ".build/Build/Products/Release/Cove.app"

      - name: Create ZIP
        run: ditto -c -k --keepParent ".build/Build/Products/Release/Cove.app" Cove.app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: cove-artifacts
          path: |
            Cove.dmg
            Cove.app.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - uses: actions/download-artifact@v4
        with:
          name: cove-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: |
            Cove.dmg
            Cove.app.zip
